services:
  budgeting-app:
    image: ghcr.io/blackdragonbe/dragonbudget:latest
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - APP_PASSWORD=${APP_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    # You can keep or remove this label; it won't hurt anything if left there.
    labels:
      - "com.centurylinklabs.watchtower.enable=true"